<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ailabs Access Control</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        tech: ['Rajdhani', 'sans-serif'],
                    },
                    colors: {
                        'glass-dark': 'rgba(15, 23, 42, 0.7)',
                        'glass-border': 'rgba(255, 255, 255, 0.1)',
                        'neon-blue': '#00f3ff',
                    },
                    backgroundImage: {
                        'radial-dark': 'radial-gradient(circle at center, #1e1e2f 0%, #0a0a10 100%)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 153, 255, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(153, 0, 255, 0.15), transparent 25%);
            color: white;
            overflow-x: hidden;
            /* Force desktop-like feel on mobile by preventing pull-to-refresh and strict sizing */
            overscroll-behavior-y: none;
        }

        /* Loading Screen Styles */
        #loading-screen {
            position: fixed;
            inset: 0;
            background-color: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
        }

        .loader-container {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            z-index: 10;
            /* Subtle pulse for the logo itself */
            animation: pulse-logo 2s infinite;
        }

        /* The spinning ring around the logo */
        .spinner-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #00f3ff;
            border-right-color: #0055ff;
            animation: spin 1.5s linear infinite;
        }
        
        .spinner-ring::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-bottom-color: rgba(0, 243, 255, 0.5);
            border-left-color: rgba(0, 243, 255, 0.5);
            animation: spin 2s linear infinite reverse;
        }

        .loading-text {
            margin-top: 30px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: #00f3ff;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
            animation: blink 1.5s infinite;
        }

        /* Glassmorphism & Glossy effects for Cards */
        .glass-card {
            background: linear-gradient(135deg, rgba(25, 30, 45, 0.6) 0%, rgba(10, 15, 25, 0.8) 100%);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Glossy Shine Effect Overlay */
        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.05) 40%,
                rgba(255, 255, 255, 0.2) 50%,
                rgba(255, 255, 255, 0.05) 60%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(45deg);
            transition: transform 0.6s ease;
            pointer-events: none;
            z-index: 1;
        }

        .glass-card:hover::before {
            transform: rotate(45deg) translate(50%, 50%);
        }

        .glass-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 20px var(--glow-color, rgba(0,255,255,0.3));
        }

        .card-content {
            position: relative;
            z-index: 2;
        }

        /* Card specific glow colors */
        .card-bot { --glow-color: rgba(0, 243, 255, 0.4); border-top: 2px solid rgba(0, 243, 255, 0.5); }
        .card-server { --glow-color: rgba(191, 0, 255, 0.4); border-top: 2px solid rgba(191, 0, 255, 0.5); }
        .card-prompt { --glow-color: rgba(0, 255, 136, 0.4); border-top: 2px solid rgba(0, 255, 136, 0.5); }

        /* Typography sizing magic to force desktop-like feel on mobile without zooming */
        /* Use clamp to fluidly adjust text size between a minimum, preferred, and maximum value */
        .fluid-title {
            font-size: clamp(18px, 2.5vw, 24px);
        }
        .fluid-desc {
            font-size: clamp(12px, 1.5vw, 15px);
        }
        .fluid-header {
            font-size: clamp(24px, 4vw, 40px);
        }

        /* iFrame View Styles */
        #iframe-view {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 50;
            display: none;
            flex-direction: column;
        }
        #iframe-view.active {
            display: flex;
            animation: slideUp 0.4s ease-out;
        }
        .iframe-header {
            height: 60px;
            background: linear-gradient(to right, rgba(10,15,25,0.9), rgba(0,50,100,0.8));
            border-bottom: 1px solid rgba(0,243,255,0.3);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            flex-shrink: 0;
        }
        iframe {
            flex-grow: 1;
            width: 100%;
            border: none;
            background-color: #fff; /* White background for iframes in case they assume it */
        }

        /* Animations */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse-logo { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.95); opacity: 0.8; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        /* Grid layout tweaks for forcing desktop style on mobile */
        /* By default grid-cols-1, but we force grid-cols-3 earlier on smaller screens */
        @media (min-width: 480px) {
            .custom-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 1rem; }
        }
        @media (max-width: 479px) {
             /* On very small phones, we still try to stack them but keep them compact like desktop blocks */
            .custom-grid { 
                grid-template-columns: 1fr; 
                gap: 1.5rem; 
                padding: 0 10%; /* Squeeze them a bit to look like individual modules */
            }
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col font-sans selection:bg-neon-blue selection:text-black">

    <div id="loading-screen">
        <div class="loader-container">
            <div class="spinner-ring"></div>
            <!-- Logo from user -->
            <img src="https://i.ibb.co.com/4nFbhTSN/Desain-tanpa-judul-20260428-191052-0000.png" alt="Ailabs Logo" class="loader-logo">
        </div>
        <div class="loading-text">Server Ailabs sedang merender...</div>
    </div>

    <main id="main-content" class="flex-grow flex flex-col opacity-0 transition-opacity duration-1000 ease-in-out relative z-10 px-4 sm:px-6 lg:px-8 py-8 sm:py-12 max-w-7xl mx-auto w-full h-screen sm:h-auto overflow-y-auto sm:justify-center">
        
        <!-- Header Section -->
        <header class="text-center mb-10 sm:mb-16 mt-4 sm:mt-0 flex flex-col items-center">
            <div class="relative w-24 h-24 sm:w-32 sm:h-32 mb-6 rounded-full p-1 bg-gradient-to-tr from-blue-600 to-cyan-300 shadow-[0_0_30px_rgba(0,243,255,0.4)]">
                <div class="w-full h-full bg-black rounded-full p-1">
                    <img src="https://i.ibb.co.com/4nFbhTSN/Desain-tanpa-judul-20260428-191052-0000.png" alt="Ailabs Main Logo" class="w-full h-full object-cover rounded-full">
                </div>
            </div>
            <h1 class="fluid-header font-tech font-bold text-transparent bg-clip-text bg-gradient-to-r from-white via-blue-100 to-blue-400 tracking-wider uppercase drop-shadow-lg">
                Ailabs Access Control
            </h1>
            <p class="mt-3 text-gray-400 max-w-2xl mx-auto fluid-desc">
                Sistem Manajemen Terpusat. Pilih modul di bawah untuk mengakses panel kontrol masing-masing sistem.
            </p>
            <div class="h-1 w-32 bg-gradient-to-r from-transparent via-blue-500 to-transparent mt-6 rounded-full opacity-50"></div>
        </header>

        <!-- The 3 Column Grid -->
        <!-- Note: We use custom-grid class defined in CSS to handle the layout responsively but keeping it tight -->
        <div class="grid custom-grid sm:grid-cols-3 gap-6 sm:gap-8 w-full">
            
            <!-- Card 1: Bot Control -->
            <button onclick="openLink('https://ai-labs-both.vercel.app/', 'Bot Control Akses')" class="glass-card card-bot rounded-2xl p-6 sm:p-8 text-left group focus:outline-none focus:ring-2 focus:ring-cyan-400">
                <div class="card-content flex flex-col h-full">
                    <div class="flex items-center justify-between mb-4">
                        <div class="w-12 h-12 rounded-lg bg-cyan-500/20 flex items-center justify-center border border-cyan-500/30 group-hover:bg-cyan-500/40 transition-colors">
                            <img src="https://i.ibb.co.com/DgtSyw0H/icon-192.png" alt="Icon Modul 1" class="w-7 h-7 object-contain drop-shadow-[0_0_8px_rgba(0,243,255,0.8)] group-hover:scale-110 transition-transform duration-300">
                        </div>
                        <span class="text-cyan-400/50 text-xs font-tech tracking-widest uppercase">Modul 01</span>
                    </div>
                    <h2 class="fluid-title font-bold text-white mb-2 font-tech tracking-wide group-hover:text-cyan-300 transition-colors">Bot Control Akses</h2>
                    <p class="text-gray-400 fluid-desc mb-6 flex-grow leading-relaxed">
                        Panel administrasi untuk mengelola pengaturan bot, log interaksi, dan parameter respons AI.
                    </p>
                    <div class="flex items-center text-cyan-400 text-sm font-semibold mt-auto group-hover:translate-x-2 transition-transform duration-300">
                        <span>Akses Panel</span>
                        <i class="fa-solid fa-arrow-right ml-2 text-xs"></i>
                    </div>
                </div>
            </button>

            <!-- Card 2: Server Access -->
            <button onclick="openLink('https://ai-labs-by-pro.vercel.app/admin.html', 'Ailabs Akses Server')" class="glass-card card-server rounded-2xl p-6 sm:p-8 text-left group focus:outline-none focus:ring-2 focus:ring-fuchsia-400">
                <div class="card-content flex flex-col h-full">
                    <div class="flex items-center justify-between mb-4">
                        <div class="w-12 h-12 rounded-lg bg-fuchsia-500/20 flex items-center justify-center border border-fuchsia-500/30 group-hover:bg-fuchsia-500/40 transition-colors">
                            <img src="https://i.ibb.co.com/DgtSyw0H/icon-192.png" alt="Icon Modul 2" class="w-7 h-7 object-contain drop-shadow-[0_0_8px_rgba(191,0,255,0.8)] group-hover:scale-110 transition-transform duration-300">
                        </div>
                        <span class="text-fuchsia-400/50 text-xs font-tech tracking-widest uppercase">Modul 02</span>
                    </div>
                    <h2 class="fluid-title font-bold text-white mb-2 font-tech tracking-wide group-hover:text-fuchsia-300 transition-colors">Ailabs Akses Server</h2>
                    <p class="text-gray-400 fluid-desc mb-6 flex-grow leading-relaxed">
                        Monitoring infrastruktur, status server pro, load balancing, dan manajemen database utama.
                    </p>
                    <div class="flex items-center text-fuchsia-400 text-sm font-semibold mt-auto group-hover:translate-x-2 transition-transform duration-300">
                        <span>Akses Panel</span>
                        <i class="fa-solid fa-arrow-right ml-2 text-xs"></i>
                    </div>
                </div>
            </button>

            <!-- Card 3: Prompt Manager -->
            <button onclick="openLink('https://ailabs-prompt-control.vercel.app/', 'Prompt Control Manager')" class="glass-card card-prompt rounded-2xl p-6 sm:p-8 text-left group focus:outline-none focus:ring-2 focus:ring-emerald-400">
                <div class="card-content flex flex-col h-full">
                    <div class="flex items-center justify-between mb-4">
                        <div class="w-12 h-12 rounded-lg bg-emerald-500/20 flex items-center justify-center border border-emerald-500/30 group-hover:bg-emerald-500/40 transition-colors">
                            <img src="https://i.ibb.co.com/DgtSyw0H/icon-192.png" alt="Icon Modul 3" class="w-7 h-7 object-contain drop-shadow-[0_0_8px_rgba(0,255,136,0.8)] group-hover:scale-110 transition-transform duration-300">
                        </div>
                        <span class="text-emerald-400/50 text-xs font-tech tracking-widest uppercase">Modul 03</span>
                    </div>
                    <h2 class="fluid-title font-bold text-white mb-2 font-tech tracking-wide group-hover:text-emerald-300 transition-colors">Prompt Control Manager</h2>
                    <p class="text-gray-400 fluid-desc mb-6 flex-grow leading-relaxed">
                        Desain, uji coba, dan optimasi prompt instruksi untuk model AI. Manajemen library prompt.
                    </p>
                    <div class="flex items-center text-emerald-400 text-sm font-semibold mt-auto group-hover:translate-x-2 transition-transform duration-300">
                        <span>Akses Panel</span>
                        <i class="fa-solid fa-arrow-right ml-2 text-xs"></i>
                    </div>
                </div>
            </button>

        </div>
        
        <!-- Footer -->
        <footer class="mt-auto pt-10 pb-6 text-center text-gray-500 text-xs sm:text-sm font-tech">
            <p>&copy; 2026 Ailabs System Control. All encrypted rights reserved.</p>
        </footer>
    </main>

    <script>
        
        // Simulate loading time as requested for the rendering screen
        window.addEventListener('load', () => {
            const loadingScreen = document.getElementById('loading-screen');
            const mainContent = document.getElementById('main-content');
            
            // Set a timeout to simulate "rendering" time (2.5 seconds)
            setTimeout(() => {
                loadingScreen.style.opacity = '0';
                loadingScreen.style.visibility = 'hidden';
                
                // Fade in main content
                setTimeout(() => {
                    mainContent.style.opacity = '1';
                }, 300); // Wait a bit after loading screen starts fading
                
            }, 2500);
        });

        // Function to handle opening links
        function openLink(url, title) {
            // Karena hosting Vercel memblokir akses jika website ditempel di dalam iFrame (menghasilkan Error 403 Forbidden),
            // sistem dialihkan menjadi Portal/Launcher yang membuka website di Tab Baru (New Tab) secara langsung.
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
